<ion-header>
  <ion-toolbar>

    <div class="toolbar-container">

      <!-- Menú y logo -->
      <div class="left-section">

        <ion-buttons>
          <ion-menu-button></ion-menu-button>
        </ion-buttons>

        <span class="menu-text">Menú</span>

      </div>

      <!-- Buscador -->
      <div class="search-section">

        <ion-searchbar
          placeholder="Buscar productos..."
          [(ngModel)]="busqueda"
          (ionInput)="onBusquedaChange()"
          show-clear-button="focus">
        </ion-searchbar>

      </div>

      <!-- Usuario y carrito -->
      <div class="right-section">

        <div class="separator"></div>

        <div
          class="user-info"
          routerLink="/login">

          <small>Hola,</small>
          <strong>Inicia sesión</strong>

        </div>

        <ion-buttons>
          <ion-button fill="clear" routerLink="/car-compra">
            <ion-icon slot="icon-only" name="cart-outline"></ion-icon>
          </ion-button>
        </ion-buttons>

      </div>

    </div>

  </ion-toolbar>
</ion-header>

<ion-content>

  <div class="container">

    <!-- Categoría -->
    <ion-item>

      <ion-label>Categoría</ion-label>

      <ion-select
        [(ngModel)]="categoriaSeleccionada"
        (ionChange)="onCategoriaChange()"
        placeholder="Todas">

        <ion-select-option
          *ngFor="let cat of categorias"
          [value]="cat.categoriaId">

          {{ cat.nombre }}

        </ion-select-option>

      </ion-select>

    </ion-item>

    <!-- Productos -->

    <div class="grid-container">

      <div
        class="grid-item"
        *ngFor="let p of productosFiltrados"
        (click)="verDetalle(p)">

        <img
          *ngIf="p.imagenUrl"
          [src]="p.imagenUrl"
          class="producto-img">

        <h3>{{ p.nombre }}</h3>

        <p>S/{{ p.precio }}</p>

        <p>Stock: {{ p.stock }}</p>

      </div>

    </div>

  </div>

</ion-content>

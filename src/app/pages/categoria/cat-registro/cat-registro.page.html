<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Registrar Categoría</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding cat-page">

  <ion-card class="cat-card">

    <ion-card-header>
      <ion-card-title>Nueva Categoría</ion-card-title>
    </ion-card-header>

    <ion-card-content>

      <form (ngSubmit)="registrar()">

        <!-- Nombre -->
        <ion-item>
          <ion-label position="floating">Nombre</ion-label>
          <ion-input [(ngModel)]="nombre" name="nombre"></ion-input>
        </ion-item>

        <!-- Descripción -->
        <ion-item>
          <ion-label position="floating">Descripción</ion-label>
          <ion-input [(ngModel)]="descripcion" name="descripcion"></ion-input>
        </ion-item>

        <!-- Activo -->
        <ion-item>
          <ion-label>Activo</ion-label>
          <ion-toggle [(ngModel)]="activo" name="activo"></ion-toggle>
        </ion-item>

        <!-- Selección de imagen -->
        <ion-item>
          <ion-label>Imagen</ion-label>
          <input
            type="file"
            accept="image/*"
            (change)="onFileSelected($event)">
        </ion-item>

        <!-- Botón subir -->
        <ion-button
          expand="block"
          fill="outline"
          class="upload-btn"
          (click)="subirImagen()"
          [disabled]="!selectedFile || subiendo">

          {{ subiendo ? 'Subiendo imagen...' : 'Subir Imagen' }}

        </ion-button>

        <!-- URL generada -->
        <ion-item *ngIf="imagenUrl">
          <ion-label position="stacked">
            URL Generada
          </ion-label>

          <ion-input [value]="imagenUrl" readonly></ion-input>
        </ion-item>

        <!-- Vista previa -->
        <div *ngIf="imagenUrl" class="preview-container">

          <img
            [src]="imagenUrl"
            alt="Vista previa"
            class="preview-img">

        </div>

        <!-- Registrar -->
        <ion-button
          expand="block"
          type="submit"
          class="save-btn"
          [disabled]="!nombre || !imagenUrl || subiendo">

          Registrar Categoría

        </ion-button>

      </form>

    </ion-card-content>

  </ion-card>

</ion-content>

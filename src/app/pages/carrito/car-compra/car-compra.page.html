<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button ></ion-menu-button>
    </ion-buttons>
    <ion-title>Carrito</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-card *ngFor="let p of carrito; let i = index">
    <img
  class="producto-img"
  [src]="p.imagenes?.[0] || 'assets/img/default.png'"
  alt="producto"
  (error)="p.imagenes = ['assets/img/default.png']"
/>
    <ion-card-header>
      <ion-card-title>{{ p.nombre }}</ion-card-title>
      <ion-card-subtitle>Precio: S/{{ p.precio }}</ion-card-subtitle>
    </ion-card-header>
    <ion-card-content>
      <p>Stock: {{ p.stock }}</p>
      <p>Categoría: {{ p.categoriaId }}</p>

      <!-- Cantidad -->
      <div class="cantidad-group">
        <ion-button size="small" color="medium" (click)="disminuirCantidad(p)">-</ion-button>
        <span class="cantidad">{{ p.cantidad }}</span>
        <ion-button size="small" color="medium" (click)="aumentarCantidad(p)">+</ion-button>
      </div>

      <ion-button expand="block" color="danger" (click)="eliminar(i)">Eliminar</ion-button>
    </ion-card-content>
  </ion-card>

  <div class="total">
    <h2>Total: S/{{ total }}</h2>
  </div>

  <ion-button expand="block" color="primary" (click)="comprar()" [disabled]="carrito.length === 0">
    Comprar
  </ion-button>

</ion-content>
